name: 自动发布 TRO 文章

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN 模式（只预览，不提交）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  publish:
    name: 生成并发布新文章
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: 安装依赖
        run: pip install -r scripts/requirements.txt

      - name: 运行发布脚本
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python scripts/auto_publish.py

      - name: 配置 git 身份
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "trolawyer-bot"
          git config user.email "bot@trolawyer.site"

      - name: 提交并推送新文章
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "本次运行没有生成新文章，跳过提交。"
            exit 0
          fi
          git add news/ index.html
          git commit -m "auto: 自动发布新文章 $(date -u +'%Y-%m-%d')"
          git push
