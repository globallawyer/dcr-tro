      - name: 运行发布脚本
        env:
          # LLM 提供商：deepseek（接近免费，推荐中国用户）/ gemini（美国区免费）/ claude（付费）
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          # DeepSeek 接近免费方案（首选，支持支付宝/微信付款）
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Gemini 免费方案（美国/海外账号）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Claude 付费方案
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 法院公开数据（免费）
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python scripts/auto_publish.py
